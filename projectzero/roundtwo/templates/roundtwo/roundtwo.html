<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра | Такое Кино</title>
    <link rel="stylesheet" href="/static/main/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/main/css/main.css">
</head>
<body>
    <div class="app-container">
        <aside>
            <div class="logo-wrapper">
                <img src="/static/main/img/logo.jpg" alt="logo" class="logo-img">
                <span class="logo-text">Такое Кино</span>
            </div>
            <nav>
                <ul>
                    <li><a href="/"><i class="fas fa-home"></i> Главная</a></li>
                    <li><a href="/about"><i class="fas fa-address-card"></i> О нас</a></li>
                    <li><a href="/roundone/start/" style="color: #e50914;"><i class="fas fa-play"></i> Играть</a></li>
                    <li><a href="/roundone/leaderboard"><i class="fas fa-trophy"></i> <span>Рекорды</span></a></li>
                </ul>
            </nav>
        </aside>
        
        <main>
            <div class="game-content-wrapper">
                <!-- 1. Блок прогресса -->
                <div class="progress-wrapper">
                    <div class="progress-info">
                        <span id="current-num">Загрузка...</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-container">
                        <div id="progress-bar"></div>
                    </div>
                    <div id="stats">
                        <!-- Сюда JS вставит иконки верных/неверных ответов -->
                    </div>
                </div>

                <!-- 2. Контейнер для вопроса и кнопок ответов -->
                <div id="question-container">
                    <!-- JS вставит сюда <h1> и <div class="answers-grid"> -->
                    <h1 class="text-center">Загрузка вопроса...</h1>
                </div>

                <!-- 3. Сообщение о результате (Правильно/Ошибка) -->
                <div id="result-message"></div>

                <!-- 4. Кнопки управления -->
                <button id="next-question-btn" class="control-btn" style="display: none;">Следующий вопрос</button>
                <a href="/roundone/result/" id="finish-round-btn" class="control-btn" style="display: none;">Завершить игру</a>
            </div>
        </main>
    </div>

    <!-- Аудио для эффектов -->
    <audio id="sound-success" src="/static/main/sounds/success.mp3"></audio>
    <audio id="sound-error" src="/static/main/sounds/error.mp3"></audio>

    {% csrf_token %}

    <script>
    let currentQuestionId = null;

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function renderStats(stats) {
        if (!stats) return;
        const percent = Math.min((stats.question_count / stats.total_limit) * 100, 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-percent').textContent = Math.round(percent) + '%';
        document.getElementById('current-num').textContent = `Вопрос ${stats.question_count} из ${stats.total_limit}`;
        
        document.getElementById('stats').innerHTML = `
            <div style="display: flex; justify-content: center; gap: 20px; font-weight: bold; margin-top: 10px;">
                <span style="color: #28a745;"><i class="fas fa-check"></i> ${stats.correct_count}</span>
                <span style="color: #e50914;"><i class="fas fa-times"></i> ${stats.wrong_count}</span>
            </div>`;
    }

    function loadQuestion() {
        const container = document.getElementById('question-container');
        document.getElementById('result-message').innerHTML = '';
        document.getElementById('next-question-btn').style.display = 'none';

        fetch('/roundone/next_question/')
            .then(r => r.json())
            .then(data => {
                if (data.finish) { window.location.href = '/roundone/result/'; return; }
                
                currentQuestionId = data.question_id;
                container.innerHTML = `
                    <h1 class="text-center fade-in">${data.question}</h1>
                    <div class="answers-grid" id="grid"></div>`;

                const grid = document.getElementById('grid');
                [data.variant_1, data.variant_2, data.variant_3, data.variant_4].forEach(v => {
                    const btn = document.createElement('button');
                    btn.className = 'answer-btn fade-in';
                    btn.textContent = v;
                    btn.onclick = () => selectAnswer(v, btn);
                    grid.appendChild(btn);
                });
                if (data.stats) renderStats(data.stats);
            })
            .catch(err => console.error("Ошибка сети или сервера:", err));
    }

    function selectAnswer(variant, clickedBtn) {
        const buttons = document.querySelectorAll('.answer-btn');
        buttons.forEach(btn => btn.disabled = true);

        fetch('/roundone/answer/', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/x-www-form-urlencoded', 
                'X-CSRFToken': getCookie('csrftoken') 
            },
            body: new URLSearchParams({ 'answer': variant, 'question_id': currentQuestionId })
        })
        .then(r => r.json())
        .then(data => {
            const msg = document.getElementById('result-message');
            msg.innerHTML = data.correct 
                ? `<span style="color: #28a745;" class="fade-in">Правильно!</span>` 
                : `<span style="color: #e50914;" class="fade-in">Ошибка!</span>`;

            try {
                if (data.correct) document.getElementById('sound-success').play();
                else {
                    document.getElementById('sound-error').play();
                    clickedBtn.classList.add('shake');
                }
            } catch(e) {}

            buttons.forEach(btn => {
                if (btn.textContent.trim() === data.correct_answer) btn.style.backgroundColor = '#28a745';
                if (!data.correct && btn.textContent.trim() === variant) btn.style.backgroundColor = '#dc3545';
            });

            renderStats(data.stats);
            if (data.finish) document.getElementById('finish-round-btn').style.display = 'block';
            else document.getElementById('next-question-btn').style.display = 'block';
        });
    }

    document.addEventListener('DOMContentLoaded', loadQuestion);
    document.getElementById('next-question-btn').onclick = loadQuestion;
    </script>
</body>
</html>
