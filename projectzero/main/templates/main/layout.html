{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | Такое Кино</title>
    
    <!-- ТОЛЬКО ЛОКАЛЬНЫЕ ФАЙЛЫ -->
    <link rel="stylesheet" href="{% static 'main/fontawesome/css/all.min.css' %}">
    <link rel="stylesheet" href="{% static 'main/css/main.css' %}">
</head>
<body>
    <div class="app-container">
        <aside>
            <div class="logo-wrapper">
                <img src="{% static 'main/img/logo.jpg' %}" alt="logo" class="logo-img">
                <span class="logo-text">Такое Кино</span>
            </div>
            <nav>
                <ul>
                    <li><a href="{% url 'home' %}"><i class="fas fa-home"></i> Главная</a></li>
                    <li><a href="{% url 'about' %}"><i class="fas fa-address-card"></i> О нас</a></li>
                    <li><a href="{% url 'start' %}" style="color: #e50914;"><i class="fas fa-play"></i> Играть</a></li>
                    <li><a href="{% url 'leaderboard' %}"><i class="fas fa-trophy"></i> <span>Рекорды</span>
    </a>
</li>
                </ul>
            </nav>
        </aside>
        
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
